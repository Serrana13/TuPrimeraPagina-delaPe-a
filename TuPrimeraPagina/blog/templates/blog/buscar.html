{% extends "blog/base.html" %}

{% block contenido %}
<h2>Buscar Heroe</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Buscar</button>
</form>

{% if resultado %}
    <h3>Resultados:</h3>
    {% for h in resultado %}
        <p>{{ h.nombre }} - {{ h.alias }}</p>
    {% endfor %}
{% endif %}

{% endblock %}
